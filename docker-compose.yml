volumes:
  rag_data:

services:
  ui:
    build:
      context: ./src/ui
      dockerfile: Dockerfile
    container_name: ui
    volumes:
      - ./src/ui/src:/app/src
      - ./src/ui/index.html:/app/index.html
    ports:
      - "5173:5173"
    restart: unless-stopped
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]

  rag:
    build:
      context: ./src/rag
      dockerfile: Dockerfile
    container_name: rag
    volumes:
      - ./src/rag:/app 
      - ./cache:/cache
      - rag_data:/data
      - ./config:/config
    ports:
      - "8000:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EMBEDDING_MODEL_NAME=BAAI/bge-base-en-v1.5
      - LLM_MODEL_NAME=gemini-2.5-flash
    restart: unless-stopped
    command: [
      "uvicorn",
      "main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--log-config", "/config/logging.yml"
    ]

  scheduler:
    build:
      context: ./src/scheduler
      dockerfile: Dockerfile
    container_name: scheduler
    volumes:
      - ./src/scheduler:/app
      - ./config:/config
    restart: unless-stopped
    command: ["watchmedo", "auto-restart", "--patterns=*.py", "--recursive", "--", "python3", "-u", "main.py"]
    
  knowledgebase:
    build:
      context: ./src/knowledgebase
      dockerfile: Dockerfile
    container_name: knowledgebase
    volumes:
      - ./src/knowledgebase:/app
      - ./cache:/cache
      - ./config:/config
    ports:
      - "8001:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - EMBEDDING_MODEL_NAME=BAAI/bge-base-en-v1.5
    restart: unless-stopped
    command: [
      "uvicorn",
      "main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--log-config", "/config/logging.yml"
    ]
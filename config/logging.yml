version: 1
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    stream: ext://sys.stdout

loggers:
  uvicorn:
    level: INFO
    handlers: []
    propagate: False

  uvicorn.error:
    level: INFO
    handlers: []
    propagate: False

  uvicorn.access:
    level: INFO
    handlers: []
    propagate: False

root:
  level: WARNING
  handlers: [console]

